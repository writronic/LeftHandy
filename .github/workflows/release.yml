name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

env:
  APP_NAME: "LeftHandy"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-sign-release:
    runs-on: macos-26
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Install create-dmg
        run: npm install -g create-dmg

      - name: Import Certificate
        env:
          DEV_ID_P12_BASE64: ${{ secrets.DEV_ID_P12_BASE64 }}
          DEV_ID_P12_PASSWORD: ${{ secrets.DEV_ID_P12_PASSWORD }}
        run: |
          KEYCHAIN_PASSWORD="$(uuidgen)"
          echo "$DEV_ID_P12_BASE64" | base64 --decode > /tmp/cert.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -lut 21600 build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security import /tmp/cert.p12 -k build.keychain \
            -P "$DEV_ID_P12_PASSWORD" \
            -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple: \
            -s -k "$KEYCHAIN_PASSWORD" build.keychain
          security list-keychains -d user -s build.keychain
          rm -f /tmp/cert.p12

      - name: Build Universal
        env:
          CI: true
          SIGNING_IDENTITY: Developer ID Application
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: ./scripts/build.sh universal

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            output/LeftHandy.dmg

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-dmg
          path: output/LeftHandy.dmg

      - name: Cleanup
        if: always()
        run: security delete-keychain build.keychain 2>/dev/null || true
